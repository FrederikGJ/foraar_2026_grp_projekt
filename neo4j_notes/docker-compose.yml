services:
  neo4j:
    image: neo4j:5.26.24-community-trixie
    container_name: bilbasen_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP / Neo4j Browser
      - "7687:7687"   # Bolt (drivere + Spring Data Neo4j)
    environment:
      # Skift passwordet — skal være mindst 8 tegn
      NEO4J_AUTH: neo4j/bilbase_dev_pw
      # APOC Core — fuldt supporteret i 5.x
      NEO4J_PLUGINS: '["apoc"]'
      # Tillad APOC at læse/skrive filer (til import/export hvis I får brug for det)
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      # Hukommelse — fint til et studieprojekt, skru op hvis I får mange data
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512m"
    volumes:
      - ./neo4j_data/data:/data
      - ./neo4j_data/logs:/logs
      - ./neo4j_data/import:/var/lib/neo4j/import
      - ./neo4j_data/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p bilbase_dev_pw 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
